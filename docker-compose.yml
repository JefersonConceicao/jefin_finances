services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: jeferson
        uid: 1000
    image: jefin_finances_app
    container_name: jefin_finances_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - jefin_network

  web:
    image: nginx:alpine
    container_name: jefin_finances_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jefin_network

  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: jefin_finances_db
    command: --max_allowed_packet=512M
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - ./docker/mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - jefin_network

networks:
  jefin_network:
    driver: bridge
